{% extends 'base.html' %}

{% block title %}
  <title>{{ entry.title }}</title>
{% endblock %}

{% block page_header %}{% endblock %}

{% block content %}

  <div>

    {% if entry %}

        <div>
          <p>
            {{ entry.body|safe }}
         </p>
        </div>

    {% else %}

      <div>
        <p>Sorry, nothing to see here.</p>
      </div>

    {% endif %}

  </div>

{% endblock %}

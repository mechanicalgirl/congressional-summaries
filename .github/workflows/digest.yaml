name: Congressional Daily Record Summary

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  X_API_KEY: ${{ secrets.X_API_KEY }}

on:
  schedule:
    - cron: "0 5 * * *"  # Daily at 5am
  workflow_dispatch:     # Manual trigger for testing

permissions:
  contents: write

jobs:
  summarize-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository to the runner
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Scrape and summarize articles
        run: python3 dailyrecord/digest.py

      - name: Check what was created
        run: |
          ls -la summaries/
          cat summaries/*.md || echo "No files found"

      - name: Commit summaries
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add summaries/
          git commit -m "Daily digest $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [ summarize-news ]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy using Rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avrh --delete --exclude=".github" --exclude="instance/"
          path: /
          remote_path: /home/cdrecord/congressional-summaries
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USERNAME }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
